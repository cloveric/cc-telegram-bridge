<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0F1C"/>
      <stop offset="0.35" stop-color="#0D1425"/>
      <stop offset="0.7" stop-color="#111B33"/>
      <stop offset="1" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="cardGlow" x1="720" y1="120" x2="1100" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818CF8" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Ambient glow orbs -->
  <circle cx="200" cy="120" r="200" fill="#818CF8" fill-opacity="0.06"/>
  <circle cx="1100" cy="520" r="280" fill="#22D3EE" fill-opacity="0.05"/>
  <circle cx="640" cy="640" r="300" fill="#C084FC" fill-opacity="0.04"/>
  <circle cx="900" cy="100" r="160" fill="#22D3EE" fill-opacity="0.04"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#94A3B8" stroke-width="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Left content -->
  <g>
    <!-- Top tag -->
    <rect x="80" y="120" width="200" height="36" rx="18" fill="rgba(130,140,248,0.12)" stroke="rgba(130,140,248,0.25)" stroke-width="1"/>
    <text x="105" y="144" fill="#A5B4FC" font-family="'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13" font-weight="600" letter-spacing="1.5">OPEN SOURCE</text>
    <circle cx="258" cy="138" r="4" fill="#34D399"/>

    <!-- Title -->
    <text x="80" y="220" fill="#F1F5F9" font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="56" font-weight="800" letter-spacing="-1.5">Codex Telegram</text>
    <text x="80" y="290" fill="#F1F5F9" font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="56" font-weight="800" letter-spacing="-1.5">Channel</text>

    <!-- Accent line -->
    <rect x="80" y="310" width="120" height="3" rx="1.5" fill="url(#accentGrad)"/>

    <!-- Subtitle -->
    <text x="80" y="360" fill="#94A3B8" font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="400">Run OpenAI Codex through Telegram</text>
    <text x="80" y="390" fill="#94A3B8" font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="400">with isolated, resumable bot instances.</text>

    <!-- Feature pills -->
    <g>
      <rect x="80" y="430" width="140" height="32" rx="16" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
      <text x="104" y="451" fill="#67E8F9" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600">Access Control</text>

      <rect x="232" y="430" width="160" height="32" rx="16" fill="rgba(130,140,248,0.1)" stroke="rgba(130,140,248,0.2)" stroke-width="1"/>
      <text x="252" y="451" fill="#A5B4FC" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600">Thread Resume</text>

      <rect x="404" y="430" width="170" height="32" rx="16" fill="rgba(192,132,252,0.1)" stroke="rgba(192,132,252,0.2)" stroke-width="1"/>
      <text x="422" y="451" fill="#D8B4FE" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600">Service Lifecycle</text>
    </g>

    <!-- Tech stack pills -->
    <g>
      <rect x="80" y="485" width="100" height="28" rx="6" fill="rgba(255,255,255,0.05)"/>
      <text x="96" y="504" fill="#64748B" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500">TypeScript</text>

      <rect x="190" y="485" width="66" height="28" rx="6" fill="rgba(255,255,255,0.05)"/>
      <text x="206" y="504" fill="#64748B" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500">Zod</text>

      <rect x="266" y="485" width="88" height="28" rx="6" fill="rgba(255,255,255,0.05)"/>
      <text x="282" y="504" fill="#64748B" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500">Node.js</text>

      <rect x="364" y="485" width="80" height="28" rx="6" fill="rgba(255,255,255,0.05)"/>
      <text x="380" y="504" fill="#64748B" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="500">Vitest</text>
    </g>
  </g>

  <!-- Right side: Terminal card -->
  <g>
    <!-- Card background -->
    <rect x="700" y="130" width="500" height="380" rx="20" fill="rgba(15,20,35,0.85)" stroke="rgba(148,163,184,0.1)" stroke-width="1"/>
    <rect x="700" y="130" width="500" height="380" rx="20" fill="url(#cardGlow)"/>

    <!-- Window chrome -->
    <circle cx="730" cy="158" r="6" fill="#EF4444" fill-opacity="0.8"/>
    <circle cx="750" cy="158" r="6" fill="#F59E0B" fill-opacity="0.8"/>
    <circle cx="770" cy="158" r="6" fill="#22C55E" fill-opacity="0.8"/>
    <text x="860" y="163" fill="#475569" font-family="'SF Mono', Consolas, monospace" font-size="12">codex-telegram-channel</text>

    <!-- Terminal line divider -->
    <line x1="720" y1="178" x2="1180" y2="178" stroke="rgba(148,163,184,0.08)" stroke-width="1"/>

    <!-- Terminal content -->
    <text x="730" y="210" fill="#6366F1" font-family="'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13" font-weight="600">$</text>
    <text x="748" y="210" fill="#CBD5E1" font-family="'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13"> telegram service start</text>

    <text x="730" y="238" fill="#34D399" font-family="'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13">&#x2713;</text>
    <text x="748" y="238" fill="#94A3B8" font-family="'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13"> Instance "default" started (PID 4821)</text>

    <text x="730" y="275" fill="#6366F1" font-family="'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13" font-weight="600">$</text>
    <text x="748" y="275" fill="#CBD5E1" font-family="'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13"> telegram service status</text>

    <text x="730" y="305" fill="#64748B" font-family="'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13">  Running:</text>
    <text x="855" y="305" fill="#34D399" font-family="'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13" font-weight="600">yes</text>
    <text x="730" y="330" fill="#64748B" font-family="'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13">  Policy:</text>
    <text x="842" y="330" fill="#A5B4FC" font-family="'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13">allowlist</text>
    <text x="730" y="355" fill="#64748B" font-family="'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13">  Bot:</text>
    <text x="800" y="355" fill="#CBD5E1" font-family="'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13">@cloveric6bot</text>
    <text x="730" y="380" fill="#64748B" font-family="'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13">  Threads:</text>
    <text x="857" y="380" fill="#22D3EE" font-family="'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13">resume enabled</text>

    <!-- Divider -->
    <line x1="720" y1="400" x2="1180" y2="400" stroke="rgba(148,163,184,0.06)" stroke-width="1"/>

    <!-- Chat preview -->
    <rect x="730" y="416" width="200" height="30" rx="10" fill="rgba(34,211,238,0.08)"/>
    <text x="746" y="436" fill="#67E8F9" font-family="'SF Mono', Consolas, monospace" font-size="12">Pair code: 2S93QL</text>

    <rect x="948" y="416" width="220" height="30" rx="10" fill="rgba(34,197,94,0.08)"/>
    <text x="964" y="436" fill="#86EFAC" font-family="'SF Mono', Consolas, monospace" font-size="12">Refactored. Tests pass.</text>

    <!-- Version badge -->
    <rect x="1080" y="468" width="100" height="24" rx="12" fill="rgba(130,140,248,0.15)" stroke="rgba(130,140,248,0.3)" stroke-width="1"/>
    <text x="1100" y="484" fill="#A5B4FC" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600">v0.1.0</text>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="636" width="1280" height="4" fill="url(#accentGrad)" opacity="0.6"/>
</svg>
