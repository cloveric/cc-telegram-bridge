<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0F1C"/>
      <stop offset="0.35" stop-color="#0D1425"/>
      <stop offset="0.7" stop-color="#111B33"/>
      <stop offset="1" stop-color="#0F1A2E"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="cardGlow1" x1="700" y1="100" x2="1050" y2="310" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818CF8" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="cardGlow2" x1="700" y1="260" x2="1050" y2="530" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C084FC" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#818CF8" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Ambient glow orbs -->
  <circle cx="200" cy="120" r="200" fill="#818CF8" fill-opacity="0.06"/>
  <circle cx="1100" cy="520" r="280" fill="#22D3EE" fill-opacity="0.05"/>
  <circle cx="640" cy="640" r="300" fill="#C084FC" fill-opacity="0.04"/>
  <circle cx="900" cy="80" r="140" fill="#22D3EE" fill-opacity="0.04"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#94A3B8" stroke-width="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Left content -->
  <g>
    <!-- Top tags -->
    <rect x="80" y="100" width="200" height="36" rx="18" fill="rgba(130,140,248,0.12)" stroke="rgba(130,140,248,0.25)" stroke-width="1"/>
    <text x="105" y="124" fill="#A5B4FC" font-family="'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13" font-weight="600" letter-spacing="1.5">OPEN SOURCE</text>
    <circle cx="258" cy="118" r="4" fill="#34D399"/>

    <rect x="292" y="100" width="170" height="36" rx="18" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
    <text x="315" y="124" fill="#67E8F9" font-family="'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13" font-weight="600" letter-spacing="1.5">MULTI-BOT</text>

    <rect x="474" y="100" width="210" height="36" rx="18" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.2)" stroke-width="1"/>
    <text x="493" y="124" fill="#FDBA74" font-family="'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13" font-weight="600" letter-spacing="1.5">CODEX + CLAUDE</text>

    <!-- Title -->
    <text x="80" y="200" fill="#F1F5F9" font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="52" font-weight="800" letter-spacing="-1.5">CC Telegram</text>
    <text x="80" y="268" fill="#F1F5F9" font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="52" font-weight="800" letter-spacing="-1.5">Bridge</text>

    <!-- Accent line -->
    <rect x="80" y="288" width="120" height="3" rx="1.5" fill="url(#accentGrad)"/>

    <!-- Subtitle -->
    <text x="80" y="330" fill="#94A3B8" font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="19" font-weight="400">Run a fleet of AI coding agents on Telegram.</text>
    <text x="80" y="358" fill="#94A3B8" font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="19" font-weight="400">Codex or Claude — each bot gets its own engine and personality.</text>

    <!-- Feature pills row 1 -->
    <g>
      <rect x="80" y="396" width="130" height="30" rx="15" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
      <text x="99" y="416" fill="#67E8F9" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600">agent.md</text>

      <rect x="222" y="396" width="160" height="30" rx="15" fill="rgba(130,140,248,0.1)" stroke="rgba(130,140,248,0.2)" stroke-width="1"/>
      <text x="242" y="416" fill="#A5B4FC" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600">Thread Resume</text>

      <rect x="394" y="396" width="150" height="30" rx="15" fill="rgba(192,132,252,0.1)" stroke="rgba(192,132,252,0.2)" stroke-width="1"/>
      <text x="412" y="416" fill="#D8B4FE" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600">Access Control</text>
    </g>

    <!-- Feature pills row 2 -->
    <g>
      <rect x="80" y="436" width="140" height="30" rx="15" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
      <text x="98" y="456" fill="#86EFAC" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600">Full Audit Trail</text>

      <rect x="232" y="436" width="170" height="30" rx="15" fill="rgba(251,191,36,0.1)" stroke="rgba(251,191,36,0.2)" stroke-width="1"/>
      <text x="249" y="456" fill="#FDE68A" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600">Service Lifecycle</text>

      <rect x="414" y="436" width="130" height="30" rx="15" fill="rgba(248,113,113,0.1)" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
      <text x="432" y="456" fill="#FCA5A5" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600">Attachments</text>
    </g>

    <!-- Tech stack -->
    <g>
      <rect x="80" y="490" width="100" height="26" rx="6" fill="rgba(255,255,255,0.05)"/>
      <text x="96" y="508" fill="#64748B" font-family="'SF Mono', Consolas, monospace" font-size="11" font-weight="500">TypeScript</text>
      <rect x="190" y="490" width="66" height="26" rx="6" fill="rgba(255,255,255,0.05)"/>
      <text x="206" y="508" fill="#64748B" font-family="'SF Mono', Consolas, monospace" font-size="11" font-weight="500">Zod</text>
      <rect x="266" y="490" width="88" height="26" rx="6" fill="rgba(255,255,255,0.05)"/>
      <text x="282" y="508" fill="#64748B" font-family="'SF Mono', Consolas, monospace" font-size="11" font-weight="500">Node.js</text>
      <rect x="364" y="490" width="80" height="26" rx="6" fill="rgba(255,255,255,0.05)"/>
      <text x="378" y="508" fill="#64748B" font-family="'SF Mono', Consolas, monospace" font-size="11" font-weight="500">Windows</text>
    </g>
  </g>

  <!-- Right side: Two bot instance cards stacked -->
  <g>
    <!-- Card 1: "work" bot -->
    <rect x="700" y="108" width="500" height="200" rx="16" fill="rgba(15,20,35,0.85)" stroke="rgba(148,163,184,0.1)" stroke-width="1"/>
    <rect x="700" y="108" width="500" height="200" rx="16" fill="url(#cardGlow1)"/>

    <!-- Card 1 chrome -->
    <circle cx="726" cy="132" r="5" fill="#EF4444" fill-opacity="0.8"/>
    <circle cx="744" cy="132" r="5" fill="#F59E0B" fill-opacity="0.8"/>
    <circle cx="762" cy="132" r="5" fill="#22C55E" fill-opacity="0.8"/>
    <rect x="790" y="122" width="80" height="20" rx="10" fill="rgba(130,140,248,0.15)"/>
    <text x="806" y="136" fill="#A5B4FC" font-family="'SF Mono', Consolas, monospace" font-size="11" font-weight="600">work</text>

    <!-- Card 1 content -->
    <text x="726" y="170" fill="#6366F1" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="600">$</text>
    <text x="740" y="170" fill="#CBD5E1" font-family="'SF Mono', Consolas, monospace" font-size="12"> service start --instance work</text>
    <text x="726" y="194" fill="#34D399" font-family="'SF Mono', Consolas, monospace" font-size="12">&#x2713;</text>
    <text x="740" y="194" fill="#94A3B8" font-family="'SF Mono', Consolas, monospace" font-size="12"> Running | engine: codex</text>

    <text x="726" y="222" fill="#64748B" font-family="'SF Mono', Consolas, monospace" font-size="11">  agent.md:</text>
    <text x="840" y="222" fill="#A5B4FC" font-family="'SF Mono', Consolas, monospace" font-size="11">"Senior code reviewer. Focus on</text>
    <text x="840" y="238" fill="#A5B4FC" font-family="'SF Mono', Consolas, monospace" font-size="11"> correctness and security."</text>

    <rect x="726" y="260" width="160" height="24" rx="8" fill="rgba(34,211,238,0.08)"/>
    <text x="740" y="276" fill="#67E8F9" font-family="'SF Mono', Consolas, monospace" font-size="11">Policy: allowlist</text>
    <rect x="900" y="260" width="190" height="24" rx="8" fill="rgba(34,197,94,0.08)"/>
    <text x="914" y="276" fill="#86EFAC" font-family="'SF Mono', Consolas, monospace" font-size="11">Threads: resume enabled</text>

    <!-- Card 2: "personal" bot -->
    <rect x="700" y="332" width="500" height="200" rx="16" fill="rgba(15,20,35,0.85)" stroke="rgba(148,163,184,0.1)" stroke-width="1"/>
    <rect x="700" y="332" width="500" height="200" rx="16" fill="url(#cardGlow2)"/>

    <!-- Card 2 chrome -->
    <circle cx="726" cy="356" r="5" fill="#EF4444" fill-opacity="0.8"/>
    <circle cx="744" cy="356" r="5" fill="#F59E0B" fill-opacity="0.8"/>
    <circle cx="762" cy="356" r="5" fill="#22C55E" fill-opacity="0.8"/>
    <rect x="790" y="346" width="110" height="20" rx="10" fill="rgba(192,132,252,0.15)"/>
    <text x="806" y="360" fill="#D8B4FE" font-family="'SF Mono', Consolas, monospace" font-size="11" font-weight="600">personal</text>

    <!-- Card 2 content -->
    <text x="726" y="394" fill="#6366F1" font-family="'SF Mono', Consolas, monospace" font-size="12" font-weight="600">$</text>
    <text x="740" y="394" fill="#CBD5E1" font-family="'SF Mono', Consolas, monospace" font-size="12"> service start --instance personal</text>
    <text x="726" y="418" fill="#34D399" font-family="'SF Mono', Consolas, monospace" font-size="12">&#x2713;</text>
    <text x="740" y="418" fill="#94A3B8" font-family="'SF Mono', Consolas, monospace" font-size="12"> Running | engine: claude</text>

    <text x="726" y="446" fill="#64748B" font-family="'SF Mono', Consolas, monospace" font-size="11">  agent.md:</text>
    <text x="840" y="446" fill="#D8B4FE" font-family="'SF Mono', Consolas, monospace" font-size="11">"Friendly assistant. Reply in</text>
    <text x="840" y="462" fill="#D8B4FE" font-family="'SF Mono', Consolas, monospace" font-size="11"> Chinese. Keep answers concise."</text>

    <rect x="726" y="484" width="160" height="24" rx="8" fill="rgba(34,211,238,0.08)"/>
    <text x="740" y="500" fill="#67E8F9" font-family="'SF Mono', Consolas, monospace" font-size="11">Policy: pairing</text>
    <rect x="900" y="484" width="190" height="24" rx="8" fill="rgba(34,197,94,0.08)"/>
    <text x="914" y="500" fill="#86EFAC" font-family="'SF Mono', Consolas, monospace" font-size="11">Threads: resume enabled</text>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="636" width="1280" height="4" fill="url(#accentGrad)" opacity="0.6"/>
</svg>
